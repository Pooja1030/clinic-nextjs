name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Get code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build backend image
      - name: Build Backend Image
        run: docker build -t clinic-backend ./backend

      # 4. Build frontend image
      - name: Build Frontend Image
        run: docker build -t clinic-frontend .

      # 5. Run containers (test stage)
      - name: Run Containers
        run: docker compose up -d

      # 6. Wait for app
      - name: Wait for services
        run: sleep 15

      # 7. Test backend
      - name: Test Backend API
        run: curl http://localhost:5000 || exit 1

      # 8. Stop containers
      - name: Stop Containers
        run: docker compose down 
