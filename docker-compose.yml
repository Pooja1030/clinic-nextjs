version: '3.8'

services:
   frontend:
      build: .
      container_name: clinic_frontend
      ports:
        - "3000:3000"
      env_file:
        - .env.production
      depends_on:
        - backend

   backend:
     build: ./backend
     container_name: clinic_backend
     ports:
       - "5000:5000"
     env_file:
       - ./backend/.env
     depends_on:
       - mongo

   mongo-express:
     image: mongo-express
     container_name: clinic_mongo_express
     ports:
       - "8081:8081"
     environment:
       ME_CONFIG_MONGODB_SERVER: mongo
       ME_CONFIG_BASICAUTH_USERNAME: admin
       ME_CONFIG_BASICAUTH_PASSWORD: admin
     depends_on:
       - mongo

   mongo:
     image: mongo:6
     container_name: clinic_mongo
     ports:
       - "27017:27017"
     volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
